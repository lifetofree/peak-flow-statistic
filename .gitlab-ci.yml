image: node:20

stages:
  - build
  - deploy

variables:
  NODE_VERSION: "20"
  WRANGLER_VERSION: "latest"
  CF_ACCOUNT_ID: "c5858a5cab50c140f0997ba9d4b32e22"
  CLOUDFLARE_API_TOKEN: "cfut_k8wzosL12exX8Fx4L8oTapDTNKhJji4I4Qm3Lahy6c760549"

# Build on pfs branch for preview testing
build_frontend_pfs:
  stage: build
  image: node:${NODE_VERSION}
  before_script:
    - cd frontend
    - npm ci --legacy-peer-deps
    - npm install @rollup/rollup-linux-x64-gnu
  script:
    - npm run build
  artifacts:
    paths:
      - frontend/dist
    expire_in: 1 week
  only:
    - pfs
  except:
    - main

# Build on main branch for production
build_frontend_main:
  stage: build
  image: node:${NODE_VERSION}
  before_script:
    - cd frontend
    - npm ci --legacy-peer-deps --silent --no-audit --no-fund
    - npm install @rollup/rollup-linux-x64-gnu --silent --no-audit --no-fund
  script:
    - npm run build --silent
  artifacts:
    paths:
      - frontend/dist
    expire_in: 1 week
  only:
    - main

# Build worker on main only
build_worker:
  stage: build
  image: node:${NODE_VERSION}
  before_script:
    - cd worker
    - npm ci --legacy-peer-deps
  script:
    - echo "Worker build - Wrangler handles TypeScript directly"
  artifacts:
    paths:
      - worker/src
      - worker/wrangler.toml
      - worker/package.json
      - worker/tsconfig.json
    expire_in: 1 week
  only:
    - main

# Manual deploy worker to production
deploy_worker:
  stage: deploy
  image: node:${NODE_VERSION}
  before_script:
    - npm install -g wrangler@${WRANGLER_VERSION}
    - cd worker
    - npm ci --legacy-peer-deps
    # Test authentication - will show if token or manual auth works
    - wrangler whoami || echo "Auth failed, trying manual login"
  script:
    # Try deployment with current auth (token or manual)
    - wrangler deploy || wrangler login && wrangler deploy
  environment:
    name: production
    url: https://api.peakflowstat.allergyclinic.cc
  only:
    - main
  when: manual

# Deploy frontend to production (manual)
deploy_frontend_production:
  stage: deploy
  image: node:${NODE_VERSION}
  dependencies: []  # Prevent artifacts/conflicts from worker deployment
  before_script:
    - npm install -g wrangler@${WRANGLER_VERSION}
    - cd frontend
    - npm ci --legacy-peer-deps
    - npm install @rollup/rollup-linux-x64-gnu
    - wrangler pages project list || echo "Checking Pages access"
  script:
    - npm run build
    # Try to create project if it doesn't exist, otherwise deploy
    - wrangler pages project create peakflowstat --production-branch=main || echo "Project may already exist"
    - wrangler pages deploy dist --project-name=peakflowstat --branch=main --commit-message="Frontend production deploy"
  environment:
    name: production
    url: https://peakflowstat.allergyclinic.cc
  only:
    - main
  when: manual
