image: node:18

stages:
  - build
  - deploy

variables:
  NODE_VERSION: "20"
  WRANGLER_VERSION: "latest"

# Build on pfs branch for preview testing
build_frontend_pfs:
  stage: build
  image: node:${NODE_VERSION}
  before_script:
    - cd frontend
    - npm ci
  script:
    - npm run build
  artifacts:
    paths:
      - frontend/dist
    expire_in: 1 week
  only:
    - pfs
  except:
    - main

# Build on main branch for production
build_frontend_main:
  stage: build
  image: node:${NODE_VERSION}
  before_script:
    - cd frontend
    - npm ci
  script:
    - npm run build
  artifacts:
    paths:
      - frontend/dist
    expire_in: 1 week
  only:
    - main

# Build worker on main only
build_worker:
  stage: build
  image: node:${NODE_VERSION}
  before_script:
    - cd worker
    - npm ci
  script:
    - npm run build
  artifacts:
    paths:
      - worker/dist
    expire_in: 1 week
  only:
    - main

# Manual deploy worker to production
deploy_worker:
  stage: deploy
  image: node:${NODE_VERSION}
  before_script:
    - npm install -g wrangler@${WRANGLER_VERSION}
    - cd worker
  script:
    - wrangler deploy
  environment:
    name: production
    url: https://api.peakflowstat.allergyclinic.cc
  only:
    - main
  when: manual

# Deploy frontend to production (manual)
deploy_frontend_production:
  stage: deploy
  image: node:${NODE_VERSION}
  before_script:
    - npm install -g wrangler@${WRANGLER_VERSION}
    - cd frontend
    - npm ci
  script:
    - npm run build
    - wrangler pages deploy dist --project-name=peakflowstat --branch=main
  environment:
    name: production
    url: https://peakflowstat.allergyclinic.cc
  only:
    - main
  when: manual
