name = "peakflowstat-api-staging"
main = "src/index.ts"
compatibility_date = "2024-01-01"

[vars]
ENVIRONMENT = "staging"
CORS_ORIGIN = "https://staging.peakflowstat.allergyclinic.cc"
FRONTEND_URL = "https://staging.peakflowstat.allergyclinic.cc"

[[d1_databases]]
binding = "DB"
database_name = "peakflowstat-db-staging"
database_id = "YOUR_STAGING_DATABASE_ID"

# KV namespace for rate limiting (staging)
# Create with: npx wrangler kv:namespace create "RATE_LIMIT" --preview
# Then replace the id below with the returned value
[[kv_namespaces]]
binding = "RATE_LIMIT"
id = "YOUR_STAGING_RATE_LIMIT_KV_ID"

[[routes]]
pattern = "api-staging.peakflowstat.allergyclinic.cc"
