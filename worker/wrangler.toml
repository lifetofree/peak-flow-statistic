name = "peakflowstat-api"
main = "src/index.ts"
compatibility_date = "2024-01-01"

[vars]
ENVIRONMENT = "production"
CORS_ORIGIN = "https://peakflowstat.allergyclinic.cc,https://main.peakflowstat.pages.dev"
FRONTEND_URL = "https://peakflowstat.allergyclinic.cc"

[[d1_databases]]
binding = "DB"
database_name = "peakflowstat-db"
database_id = "812f290e-51dc-433b-a2d8-4156dadd72d0"

# KV namespace for rate limiting
# Create with: npx wrangler kv:namespace create "RATE_LIMIT"
# Then replace the id below with the returned value
[[kv_namespaces]]
binding = "RATE_LIMIT"
id = "YOUR_RATE_LIMIT_KV_ID"

[[routes]]
pattern = "api.peakflowstat.allergyclinic.cc"
custom_domain = true
