name = "peakflowstat-api-dev"
main = "src/index.ts"
compatibility_date = "2024-01-01"

[vars]
ENVIRONMENT = "development"
CORS_ORIGIN = "http://localhost:5173"
FRONTEND_URL = "http://localhost:5173"

[[d1_databases]]
binding = "DB"
database_name = "peakflowstat-db-dev"
database_id = "eecd116e-2ac2-4350-9eee-a39e061d25ab"

# KV namespace for rate limiting (development)
# Create with: npx wrangler kv:namespace create "RATE_LIMIT" --preview
# Then replace the id and preview_id below with the returned values
[[kv_namespaces]]
binding = "RATE_LIMIT"
id = "YOUR_DEV_RATE_LIMIT_KV_ID"
preview_id = "YOUR_DEV_RATE_LIMIT_PREVIEW_ID"

[[routes]]
pattern = "api.dev.peakflowstat.allergyclinic.cc"
custom_domain = true
